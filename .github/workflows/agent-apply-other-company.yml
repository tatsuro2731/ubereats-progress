name: Apply other-company work tracking

on:
  push:
    branches:
      - agent/other-company-work
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-test:
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/other-company-work
          fetch-depth: 0

      - name: Apply deterministic patch
        run: python scripts/apply_other_company.py
