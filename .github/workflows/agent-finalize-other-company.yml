name: Finalize other-company tracking

on:
  push:
    branches:
      - agent/other-company-work

permissions:
  contents: write

jobs:
  finalize-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/other-company-work
          fetch-depth: 0

      - name: Apply final consistency fixes
        run: python scripts/finalize_other_company.py

      - name: Validate application
        run: |
          set -o pipefail
          if ! {
            node --check app-enhancements.js
            node --check app-session-ui-fix.js
            node --test tests/*.test.js
            git diff --check
          } 2>&1 | tee finalize-test-output.txt; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Record final other-company test diagnostic" || true
            git push origin HEAD:agent/other-company-work
            exit 1
          fi
          rm -f finalize-test-output.txt

      - name: Commit final fixes
        run: |
          rm -f scripts/finalize_other_company.py
          rm -f .github/workflows/agent-finalize-other-company.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "他社稼働の保存導線とPWA更新を整合"
          git push origin HEAD:agent/other-company-work
