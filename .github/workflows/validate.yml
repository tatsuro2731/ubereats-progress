name: Validate app
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check JavaScript syntax
        run: |
          node --check app-enhancements.js
          node --check app-enhancements-fix.js
          node --check app-session-ui-fix.js
          node --check sw.js
      - name: Verify required files and injection
        run: |
          test -f index.html
          test -f app-enhancements.js
          test -f app-enhancements-fix.js
          test -f app-session-ui-fix.js
          grep -q 'app-enhancements.js' sw.js
          grep -q 'app-enhancements-fix.js' sw.js
          grep -q 'app-session-ui-fix.js' sw.js
      - name: Verify responsive timer and start editor hooks
        run: |
          grep -q 'remainSync' app-session-ui-fix.js
          grep -q 'max-width:430px' app-session-ui-fix.js
          grep -q 'max-width:350px' app-session-ui-fix.js
          grep -q 'datetime-local' app-session-ui-fix.js
          grep -q 'sessionStartAt' app-session-ui-fix.js