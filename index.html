<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Uber配達進捗">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1115">
<meta name="description" content="Uber Eats配達の目標件数に対する進捗を確認するツール">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=6">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="apple-touch-icon.png?v=6">
<link rel="manifest" href="manifest.webmanifest?v=6">
<title>Uber配達進捗</title>
<style>
:root{--bg:#0f1115;--card:#181b22;--muted:#9aa3b2;--text:#f4f6fb;--line:#2a2f3a;--good:#33d17a;--warn:#f6c343;--bad:#ff6b6b;--input:#10131a}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);padding:max(14px,env(safe-area-inset-top)) 14px max(18px,env(safe-area-inset-bottom));line-height:1.4}.wrap{max-width:680px;margin:0 auto}.header{display:flex;justify-content:space-between;align-items:center;margin:2px 2px 10px}h1{font-size:22px;margin:0}.tag{color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:12px}.hero{text-align:center;padding:18px 12px;border-radius:20px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.018))}.hero.good{border-color:rgba(51,209,122,.35);background:rgba(51,209,122,.08)}.hero.warn{border-color:rgba(246,195,67,.35);background:rgba(246,195,67,.08)}.hero.bad{border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.08)}.caption{color:var(--muted);font-size:13px}.main{font-size:clamp(34px,11vw,54px);font-weight:900;letter-spacing:-.04em;line-height:1.05}.sub{font-size:21px;font-weight:800;margin-top:8px}.goodTxt{color:var(--good)}.warnTxt{color:var(--warn)}.badTxt{color:var(--bad)}.mini{margin-top:8px;color:var(--muted);font-size:13px}.chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}@media(max-width:390px){.chips{grid-template-columns:1fr}}.chip,.card,details{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px}.chip .k,.detail .k,label{color:var(--muted);font-size:12px}.chip .v,.detail .v{font-size:18px;font-weight:850}.card{margin:10px 0}.actions{display:grid;grid-template-columns:1fr 1.55fr;gap:10px}button{border:1px solid var(--line);border-radius:16px;color:var(--text);background:#202532;font-weight:900;touch-action:manipulation}.minus{font-size:20px;padding:18px 10px}.plus{font-size:26px;padding:18px 10px;background:#25304a}.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:520px){.controls{grid-template-columns:1fr}}label{display:block;margin-bottom:6px}select{width:100%;font-size:20px;padding:11px 10px;border-radius:13px;border:1px solid var(--line);background:var(--input);color:var(--text);outline:none}.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.reset{width:100%;font-size:15px;padding:12px 10px;background:#181d28}.detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}@media(max-width:520px){.detailGrid{grid-template-columns:1fr}}details{margin-top:10px;background:#11151d}summary{color:var(--muted);font-weight:800}.foot{color:var(--muted);font-size:12px;text-align:center;margin-top:12px}
</style>
</head>
<body>
<div class="wrap">
<div class="header"><h1>Uber配達進捗</h1><div class="tag">12時間固定</div></div>
<div id="hero" class="hero"><div class="caption">現在の進捗</div><div id="main" class="main">-</div><div id="order" class="sub">-</div><div id="mini" class="mini">-</div></div>
<div class="chips"><div class="chip"><div class="k">残り件数</div><div id="remainOrders" class="v">-</div></div><div class="chip"><div class="k">必要ペース</div><div id="needPace" class="v">-</div></div><div class="chip"><div class="k">目標ペース</div><div id="targetPace" class="v">-</div></div></div>
<div class="card"><div class="actions"><button id="minus" class="minus">−1件</button><button id="plus" class="plus">＋1件</button></div></div>
<div class="card"><div class="controls"><div><label>目標件数</label><select id="target"></select></div><div><label>完了件数</label><select id="done"></select></div><div><label>残り稼働時間</label><div class="row2"><select id="remainH"></select><select id="remainM"></select></div></div><div><label>操作</label><button id="reset" class="reset">リセット</button></div></div>
<details><summary>詳細を見る</summary><div class="detailGrid"><div class="detail"><div class="k">残り必要時間</div><div id="required" class="v">-</div></div><div class="detail"><div class="k">残り稼働時間</div><div id="available" class="v">-</div></div><div class="detail"><div class="k">予定比</div><div id="delta" class="v">-</div></div><div class="detail"><div class="k">完了率</div><div id="rate" class="v">-</div></div></div></details></div>
<div class="foot">入力値は端末内に保存されます。</div>
</div>
<script>
const LIMIT=720,KEY="ubereatsProgressFixed12Data",$=id=>document.getElementById(id);
function opts(el,a,b,s="",step=1,pad=false){for(let v=a;v<=b;v+=step){let o=document.createElement("option");o.value=v;o.textContent=(pad?String(v).padStart(2,"0"):v)+s;el.appendChild(o)}}
function init(){opts($("target"),20,80,"件");opts($("done"),0,80,"件");opts($("remainH"),0,12,"時間");opts($("remainM"),0,59,"分",1,true);$("target").value=46;$("done").value=10;$("remainH").value=10;$("remainM").value=12;load();calc()}
function n(id){let v=parseFloat($(id).value);return Number.isFinite(v)?v:0}
function fm(m){let a=Math.abs(m),h=Math.floor(a/60),mm=Math.round((a%60)*10)/10;return h?`${h}時間${mm.toFixed(1)}分`:`${mm.toFixed(1)}分`}
function fp(m){return Number.isFinite(m)?`${m.toFixed(2)}分/件`:"-"}
function sig(v,u,d=1){return `${v>=0?"+":""}${v.toFixed(d)}${u}`}
function save(){localStorage.setItem(KEY,JSON.stringify({target:$("target").value,done:$("done").value,remainH:$("remainH").value,remainM:$("remainM").value}))}
function load(){try{let d=JSON.parse(localStorage.getItem(KEY)||"{}");Object.keys(d).forEach(k=>{$(k)&&( $(k).value=d[k])})}catch(e){}}
function tone(slack,per,left){let h=$("hero"),m=$("main"),o=$("order");h.className="hero";m.className="main";o.className="sub";if(left===0||slack>=per){h.classList.add("good");m.classList.add("goodTxt");o.classList.add("goodTxt")}else if(slack>=0){h.classList.add("warn");m.classList.add("warnTxt");o.classList.add("goodTxt")}else{h.classList.add("bad");m.classList.add("badTxt");o.classList.add("badTxt")}}
function calc(){let target=Math.max(n("target"),1),done=Math.max(n("done"),0),remain=Math.max(n("remainH")*60+n("remainM"),0),per=LIMIT/target,left=Math.max(target-done,0),req=left*per,slack=remain-req,slackOrder=slack/per,need=left?remain/left:0,elapsed=Math.max(LIMIT-remain,0),delta=done-elapsed/per,rate=Math.min(done/target*100,100);tone(slack,per,left);if(left===0){$("main").textContent="目標達成";$("order").textContent=`${done}件完了`;$("mini").textContent="お疲れさまです"}else{$("main").textContent=fm(slack)+(slack>=0?"余裕":"遅れ");$("order").textContent=(slackOrder>=0?"先行 ":"遅れ ")+sig(slackOrder,"件",2);$("mini").textContent=`残り${left}件 / 残り${Math.floor(remain/60)}時間${String(remain%60).padStart(2,"0")}分`}$("remainOrders").textContent=`${left}件`;$("needPace").textContent=left?fp(need):"達成済み";$("targetPace").textContent=fp(per);$("required").textContent=fm(req);$("available").textContent=fm(remain);$("delta").textContent=sig(delta,"件",2);$("rate").textContent=`${rate.toFixed(1)}%`;save()}
["target","done","remainH","remainM"].forEach(id=>document.addEventListener("change",e=>{if(e.target.id===id)calc()}));
document.addEventListener("click",e=>{if(e.target.id==="plus"){$("done").value=Math.min(n("done")+1,80);calc()}if(e.target.id==="minus"){$("done").value=Math.max(n("done")-1,0);calc()}if(e.target.id==="reset"){$("done").value=0;$("remainH").value=12;$("remainM").value=0;calc()}});
init();
</script>
</body>
</html>
