<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Uber配達進捗">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b1018">
<meta name="description" content="Uber Eats配達の目標件数に対する進捗を確認するツール">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=9">
<link rel="apple-touch-icon-precomposed" sizes="180x180" href="apple-touch-icon.png?v=9">
<link rel="manifest" href="manifest.webmanifest?v=9">
<title>Uber配達進捗</title>
<style>
:root{--bg:#0b1018;--card:#111827;--card2:#0d1421;--line:#243149;--text:#f4f7fb;--muted:#a6b1c3;--good:#22c55e;--warn:#f6c343;--bad:#ff6b6b;--input:#0a1220;--blue:#2b3c6a;--green:#16a34a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:max(14px,env(safe-area-inset-top)) 14px max(18px,env(safe-area-inset-bottom));line-height:1.4}.wrap{max-width:760px;margin:auto}.header{display:flex;justify-content:space-between;align-items:center;margin:2px 2px 10px}h1{font-size:22px;margin:0;font-weight:900}.tag{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:6px 10px}.hero{border:1px solid #856519;border-radius:24px;padding:18px 14px;text-align:center;background:linear-gradient(180deg,rgba(246,195,67,.10),rgba(246,195,67,.06));margin:10px 0 12px}.hero.good{border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.08)}.hero.bad{border-color:rgba(255,107,107,.45);background:rgba(255,107,107,.08)}.caption{font-size:13px;color:#d7dde8}.main{font-size:clamp(38px,11vw,60px);font-weight:900;letter-spacing:-.04em;line-height:1.05}.sub{font-size:22px;font-weight:900;margin-top:8px}.mini{margin-top:10px;color:#d4d9e3;font-size:15px}.goodTxt{color:var(--good)}.warnTxt{color:var(--warn)}.badTxt{color:var(--bad)}.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px}.metric,.card,details{background:var(--card);border:1px solid var(--line);border-radius:20px}.metric{padding:12px 10px;min-height:96px}.metric .k,.detail .k,label{font-size:11px;color:var(--muted)}.metric .v,.detail .v{font-size:clamp(16px,4.4vw,21px);font-weight:900;line-height:1.16;word-break:keep-all}.note{font-size:10px;color:var(--muted);margin-top:6px}.card{padding:16px;margin:12px 0;box-shadow:0 8px 26px rgba(0,0,0,.18)}button{appearance:none;border:none;border-radius:20px;color:var(--text);font-weight:900}.actions{display:grid;grid-template-columns:1fr 1.55fr;gap:14px}.minus,.plus{padding:24px 12px;font-size:32px;background:#23335c;border:1px solid #31456f}.plus{background:var(--blue)}.countHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.countTitle{font-size:18px;font-weight:900}.help{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:#1d2840;border:1px solid #33415d;font-weight:900}.countPanel{background:linear-gradient(180deg,#07131f,#0c1727);border:1px solid #22334f;border-radius:22px;padding:16px}.countTop{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.status{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:900;color:#6ef099}.dot{width:18px;height:18px;border-radius:50%;background:var(--good);box-shadow:0 0 0 4px rgba(34,197,94,.18)}.remainBig{font-size:clamp(22px,6.8vw,34px);font-weight:900}.desc{margin-top:10px;color:#dbe3ef;font-size:13px}.toggleBtn{width:100%;margin-top:14px;padding:18px 14px;background:linear-gradient(180deg,#1db954,var(--green));border:1px solid rgba(255,255,255,.18);font-size:28px;line-height:1.05}.toggleBtn.off{background:#334155;border:1px solid #485569}.toggleSub{display:block;font-size:14px;opacity:.9;margin-top:6px}.hint{margin-top:10px;color:var(--muted);font-size:12px}.controls{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:560px){.controls{grid-template-columns:1fr}}label{display:block;margin-bottom:8px;color:#c8d0dd;font-size:14px}select{width:100%;background:var(--input);border:1px solid var(--line);color:var(--text);border-radius:18px;padding:14px;font-size:22px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.reset{width:100%;padding:18px;background:#18253d;border:1px solid #30405e;font-size:18px}details{margin-top:18px;background:var(--card2);padding:14px}summary{list-style:none;cursor:pointer;font-size:18px;font-weight:900}summary:before{content:'▸ ';color:#b8c3d6}details[open] summary:before{content:'▾ '}.detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}@media(max-width:560px){.detailGrid{grid-template-columns:1fr}}.detail{background:#111a2d;border:1px solid #22334f;border-radius:18px;padding:12px}.foot{color:var(--muted);font-size:12px;text-align:center;margin:12px 0}
</style>
</head>
<body><div class="wrap">
<div class="header"><h1>Uber配達進捗</h1><div class="tag">12時間固定</div></div>
<div id="hero" class="hero"><div class="caption">現在の進捗</div><div id="mainValue" class="main">-</div><div id="subValue" class="sub">-</div><div id="miniValue" class="mini">-</div></div>
<div class="metrics"><div class="metric"><div class="k">残り件数</div><div id="remainOrders" class="v">-</div></div><div class="metric"><div class="k">必要ペース</div><div id="needPace" class="v">-</div></div><div class="metric"><div class="k">終了予測</div><div id="eta" class="v">-</div><div class="note">現ペース継続</div></div></div>
<div class="metrics"><div class="metric"><div class="k">狙える件数</div><div id="safeTarget" class="v">-</div><div class="note">目標ペース基準</div></div><div class="metric"><div class="k">現ペース</div><div id="paceTarget" class="v">-</div><div class="note">12時間換算</div></div><div class="metric"><div class="k">目標ペース</div><div id="targetPace" class="v">-</div></div></div>
<div class="card"><div class="actions"><button id="minus" class="minus">−1件</button><button id="plus" class="plus">＋1件</button></div></div>
<div class="card"><div class="countHead"><div class="countTitle">残り時間カウント</div><div class="help">?</div></div><div class="countPanel"><div class="countTop"><div class="status"><span class="dot"></span><span id="countStatus">停止中</span></div><div id="countRemain" class="remainBig">残り 0時間00分</div></div><div class="desc">Uberの仕様に合わせて、残り稼働時間のカウントをしています</div><button id="countToggle" class="toggleBtn">時間ON<span id="countSub" class="toggleSub">進める</span></button><div class="hint">案件中・走行中はON、停止して鳴り待ちはOFF。残り時間を手で直すと、その値を基準に再計算します。</div></div></div>
<div class="card"><div class="controls"><div><label>目標件数</label><select id="target"></select></div><div><label>完了件数</label><select id="done"></select></div><div><label>残り稼働時間</label><div class="row2"><select id="remainH"></select><select id="remainM"></select></div></div><div><label>操作</label><button id="reset" class="reset">リセット</button></div></div><details><summary>詳細を見る</summary><div class="detailGrid"><div class="detail"><div class="k">実績ペース</div><div id="actualPace" class="v">-</div></div><div class="detail"><div class="k">残り必要時間</div><div id="requiredTime" class="v">-</div></div><div class="detail"><div class="k">残り稼働時間</div><div id="availableTime" class="v">-</div></div><div class="detail"><div class="k">予定比</div><div id="scheduleDelta" class="v">-</div></div><div class="detail"><div class="k">完了率</div><div id="completionRate" class="v">-</div></div><div class="detail"><div class="k">現在時刻</div><div id="nowClock" class="v">-</div></div></div></details></div><div class="foot">終了予測はスマホの現在時刻を使った目安です。</div></div>
<script>
const LIMIT=720,DATA='ubereatsProgressFixed12Data',CLOCK='ubereatsProgressClockState',$=id=>document.getElementById(id);let cs={on:false,baseRemain:0,baseAt:Date.now()};
function opt(el,a,b,s='',step=1,pad=false){for(let v=a;v<=b;v+=step){let o=document.createElement('option');o.value=v;o.textContent=(pad?String(v).padStart(2,'0'):v)+s;el.appendChild(o)}}
function num(id){let v=parseFloat($(id).value);return Number.isFinite(v)?v:0}function manual(){return Math.max(num('remainH')*60+num('remainM'),0)}
function setRemain(m){m=Math.max(0,Math.round(m));$('remainH').value=Math.min(Math.floor(m/60),12);$('remainM').value=Math.min(m%60,59)}
function currentRemain(){if(!cs.on)return manual();let e=Math.floor((Date.now()-cs.baseAt)/60000),r=Math.max(0,cs.baseRemain-e);if(r<=0){cs.on=false;saveClock()}return r}
function syncClock(){cs.baseRemain=manual();cs.baseAt=Date.now();saveClock()}function toggle(){let r=currentRemain();setRemain(r);cs={on:!cs.on,baseRemain:r,baseAt:Date.now()};saveClock();calc()}
function saveClock(){localStorage.setItem(CLOCK,JSON.stringify(cs))}function loadClock(){try{let d=JSON.parse(localStorage.getItem(CLOCK)||'{}');if(typeof d.on==='boolean')cs={on:d.on,baseRemain:Number(d.baseRemain)||manual(),baseAt:Number(d.baseAt)||Date.now()}}catch(e){}}
function saveData(){localStorage.setItem(DATA,JSON.stringify({target:$('target').value,done:$('done').value,remainH:$('remainH').value,remainM:$('remainM').value}))}
function loadData(){try{let d=JSON.parse(localStorage.getItem(DATA)||'{}');Object.keys(d).forEach(k=>{$(k)&&($(k).value=d[k])})}catch(e){}}
function fm(m){let a=Math.abs(m),h=Math.floor(a/60),mm=Math.round((a%60)*10)/10;return h?`${h}時間${mm.toFixed(1)}分`:`${mm.toFixed(1)}分`}function pace(m){return Number.isFinite(m)&&m>0?`${m.toFixed(2)}分/件`:'-'}function sig(v,u,d=1){return`${v>=0?'+':''}${v.toFixed(d)}${u}`}function clk(d){return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false})}function eta(m){if(!Number.isFinite(m)||m<0)return'-';let n=new Date(),e=new Date(n.getTime()+m*60000);return(e.toDateString()!==n.toDateString()?'明日':'')+clk(e)}function remLab(m){m=Math.max(0,Math.round(m));return`残り ${Math.floor(m/60)}時間${String(m%60).padStart(2,'0')}分`}
function tone(slack,per,left){let h=$('hero'),m=$('mainValue'),s=$('subValue');h.className='hero';m.className='main';s.className='sub';if(left===0||slack>=per){h.classList.add('good');m.classList.add('goodTxt');s.classList.add('goodTxt')}else if(slack>=0){h.classList.add('warn');m.classList.add('warnTxt');s.classList.add('goodTxt')}else{h.classList.add('bad');m.classList.add('badTxt');s.classList.add('badTxt')}}
function countUI(r){$('countRemain').textContent=remLab(r);let b=$('countToggle'),sub=$('countSub');if(cs.on){$('countStatus').textContent='カウント中';b.classList.add('off');b.firstChild.nodeValue='時間OFF';sub.textContent='止める'}else{$('countStatus').textContent='停止中';b.classList.remove('off');b.firstChild.nodeValue='時間ON';sub.textContent='進める'}}
function calc(){let target=Math.max(num('target'),1),done=Math.max(num('done'),0),remain=currentRemain();if(cs.on)setRemain(remain);let per=LIMIT/target,left=Math.max(target-done,0),req=left*per,slack=remain-req,so=slack/per,need=left?remain/left:0,elapsed=Math.max(LIMIT-remain,0),actual=done>0&&elapsed>0?elapsed/done:NaN,finish=Number.isFinite(actual)?actual*left:NaN,delta=done-elapsed/per,rate=Math.min(done/target*100,100),safe=Math.floor(done+remain/per),pCount=Number.isFinite(actual)?LIMIT/actual:NaN;tone(slack,per,left);if(left===0){$('mainValue').textContent='目標達成';$('subValue').textContent=`${done}件完了`;$('miniValue').textContent='お疲れさまです'}else{$('mainValue').textContent=fm(slack)+(slack>=0?'余裕':'遅れ');$('subValue').textContent=(so>=0?'先行 ':'遅れ ')+sig(so,'件',2);$('miniValue').textContent=`残り${left}件 / 残り${Math.floor(remain/60)}時間${String(Math.round(remain%60)).padStart(2,'0')}分`}$('remainOrders').textContent=`${left}件`;$('needPace').textContent=left?pace(need):'達成済み';$('eta').textContent=left===0?'達成済み':eta(finish);$('safeTarget').textContent=`${safe}件まで`;$('paceTarget').textContent=Number.isFinite(pCount)?`${pCount.toFixed(1)}件`:'-';$('targetPace').textContent=pace(per);$('actualPace').textContent=pace(actual);$('requiredTime').textContent=fm(req);$('availableTime').textContent=fm(remain);$('scheduleDelta').textContent=sig(delta,'件',2);$('completionRate').textContent=`${rate.toFixed(1)}%`;$('nowClock').textContent=clk(new Date());countUI(remain);saveData()}
function setup(){opt($('target'),20,80,'件');opt($('done'),0,80,'件');opt($('remainH'),0,12,'時間');opt($('remainM'),0,59,'分',1,true);$('target').value=46;$('done').value=10;$('remainH').value=10;$('remainM').value=12;loadData();loadClock();calc();setInterval(calc,15000);['target','done','remainH','remainM'].forEach(id=>$(id).addEventListener('change',()=>{if(id==='remainH'||id==='remainM')syncClock();calc()}));$('plus').onclick=()=>{$('done').value=Math.min(num('done')+1,80);calc()};$('minus').onclick=()=>{$('done').value=Math.max(num('done')-1,0);calc()};$('reset').onclick=()=>{$('done').value=0;$('remainH').value=12;$('remainM').value=0;cs={on:false,baseRemain:720,baseAt:Date.now()};saveClock();calc()};$('countToggle').onclick=toggle}setup();
</script></body></html>
