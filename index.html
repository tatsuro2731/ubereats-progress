<body>
<div class="wrap">
  <div class="header"><h1>Uber配達進捗</h1><div id="constraintTag" class="tag">12時間制限基準</div></div>
  <div id="hero" class="hero"><div class="caption">現在の進捗</div><div id="mainValue" class="main">-</div><div id="subValue" class="sub">-</div><div id="miniValue" class="mini">-</div></div>
  <div id="metrics" class="metrics"></div>
  <div class="card actionsCard"><div class="actions"><button id="minus" class="minus">−1件</button><button id="plus" class="plus">＋1件</button></div></div>
  <div class="card">
    <div class="countHead"><div class="countTitle">残り時間カウント</div><button id="helpBtn" class="help" type="button" aria-expanded="false" aria-controls="helpText">?</button></div>
    <div id="countPanel" class="countPanel">
      <div class="countTop"><div class="status"><span id="countDot" class="dot stop"></span><span id="countStatus">停止中</span></div><div id="countRemain" class="remainBig">残り 0時間00分</div></div>
      <div class="desc">ON中は残り時間を自動で減らします</div>
      <button id="countToggle" class="toggleBtn">時間ON<span id="countSub" class="toggleSub">進める</span></button>
      <div class="hint">案件中・走行中はON、停止して鳴り待ちはOFF。残り時間を手で直すと、その値を基準に再計算します。</div>
      <div id="helpText" class="helpText" hidden>案件中・走行中はON。鳴り待ち・休憩中はOFF。ON中は残り稼働時間が自動で減ります。手動で残り時間を変更すると、その値を基準に再計算します。</div>
    </div>
  </div>
  <div class="card">
    <div class="controls">
      <div><label>目標件数</label><select id="target"></select></div>
      <div><label>完了件数</label><select id="done"></select></div>
      <div><label>残り稼働時間</label><div class="row2"><select id="remainH"></select><select id="remainM"></select></div></div>
      <div><label>終了上限 <span id="endText">なし</span></label><div class="endRow"><input id="endLimit" type="time"><button id="clearEnd" class="clearEnd" type="button">クリア</button></div></div>
      <div><label>操作</label><button id="reset" class="reset">リセット</button></div>
    </div>
    <details>
      <summary>詳細を見る</summary>
      <div class="detailGrid">
        <div class="detail"><div class="k">実績ペース</div><div id="actualPace" class="v">-</div></div>
        <div class="detail"><div class="k">残り必要時間</div><div id="requiredTime" class="v">-</div></div>
        <div class="detail"><div class="k">有効残り時間</div><div id="availableTime" class="v">-</div></div>
        <div class="detail"><div class="k">予定比</div><div id="scheduleDelta" class="v">-</div></div>
        <div class="detail"><div class="k">完了率</div><div id="completionRate" class="v">-</div></div>
        <div class="detail"><div class="k">現在時刻</div><div id="nowClock" class="v">-</div></div>
      </div>
      <div class="settings">
        <div class="settingsTitle">小カード表示</div>
        <div class="settingsGrid"><div class="selBox"><label>表示枚数</label><select id="cardCount"><option value="3">3枚</option><option value="6">6枚</option></select></div></div>
        <div id="cardSelectors" class="settingsGrid"></div>
      </div>
    </details>
  </div>
  <div class="foot">終了予測はスマホの現在時刻を使った目安です。</div>
</div>
<script>
const WORK_LIMIT_MINUTES = 720;
const STORAGE_KEY = "ubereatsProgressFixed12Data";
const CLOCK_KEY = "ubereatsProgressClockState";
const PACE_MODE_KEY_PREFIX = "ubereatsProgressPaceDisplayMode:";
const $ = id => document.getElementById(id);
const DEFAULT_CARDS = ["remaining", "need", "eta", "safe", "project12", "targetPace"];
const CARD_OPTIONS = [
  ["remaining", "進捗件数"],
  ["need", "必要ペース"],
  ["eta", "終了予測"],
  ["safe", "狙える件数"],
  ["targetPace", "目標ペース"],
  ["project12", "上限まで走ると"],
  ["constraint", "制約条件"]
];
let clockState = { on: false, baseRemain: 0, baseAt: Date.now() };
let cardCount = 6;
let cards = [...DEFAULT_CARDS];

function addOptions(element, start, end, suffix = "", step = 1, pad = false) {
  for (let value = start; value <= end; value += step) {
    const option = document.createElement("option");
    option.value = String(value);
    option.textContent = `${pad ? String(value).padStart(2, "0") : value}${suffix}`;
    element.appendChild(option);
  }
}

function n(id) {
  const value = parseFloat($(id).value);
  return Number.isFinite(value) ? value : 0;
}

function manualRemain() {
  return Math.max(n("remainH") * 60 + n("remainM"), 0);
}

function setRemain(minutes) {
  const value = Math.max(0, Math.round(minutes));
  $("remainH").value = String(Math.min(Math.floor(value / 60), 12));
  $("remainM").value = String(Math.min(value % 60, 59));
}

function remain() {
  if (!clockState.on) return manualRemain();
  const elapsed = Math.floor((Date.now() - clockState.baseAt) / 60000);
  const value = Math.max(0, clockState.baseRemain - elapsed);
  if (value <= 0) {
    clockState.on = false;
    clockState.baseRemain = 0;
    saveClock();
  }
  return value;
}

function syncClock() {
  clockState.baseRemain = manualRemain();
  clockState.baseAt = Date.now();
  saveClock();
}

function stopClock(remaining) {
  const value = Math.max(0, Math.round(remaining));
  setRemain(value);
  clockState = { on: false, baseRemain: value, baseAt: Date.now() };
  saveClock();
  save();
}

function toggleClock() {
  const value = remain();
  setRemain(value);
  clockState = { on: !clockState.on, baseRemain: value, baseAt: Date.now() };
  saveClock();
  save();
  calc();
}

function saveClock() {
  localStorage.setItem(CLOCK_KEY, JSON.stringify(clockState));
}

function loadClock() {
  try {
    const data = JSON.parse(localStorage.getItem(CLOCK_KEY) || "{}");
    if (typeof data.on === "boolean") {
      clockState = {
        on: data.on,
        baseRemain: Number(data.baseRemain) || manualRemain(),
        baseAt: Number(data.baseAt) || Date.now()
      };
    }
  } catch (e) {}
}

function fillCards(value) {
  const result = [...value];
  DEFAULT_CARDS.forEach(id => {
    if (result.length < 6 && !result.includes(id)) result.push(id);
  });
  CARD_OPTIONS.forEach(option => {
    if (result.length < 6 && !result.includes(option[0])) result.push(option[0]);
  });
  return result.slice(0, 6);
}

function save() {
  const endLimitTime = $("endLimit").value;
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    target: $("target").value,
    done: $("done").value,
    remainH: $("remainH").value,
    remainM: $("remainM").value,
    endLimitTime,
    endLimit: endLimitTime,
    displayCount: String(cardCount),
    cardCount: String(cardCount),
    displayCards: cards
  }));
}

function load() {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    Object.keys(data).forEach(key => {
      if ($(key)) $(key).value = data[key];
    });
    if (data.endLimitTime !== undefined) $("endLimit").value = data.endLimitTime || "";
    else if (data.endLimit !== undefined) $("endLimit").value = data.endLimit || "";
    cardCount = Number(data.displayCount || data.cardCount) === 3 ? 3 : 6;
    if (Array.isArray(data.displayCards)) {
      cards = data.displayCards.filter(id => CARD_OPTIONS.some(option => option[0] === id));
    }
  } catch (e) {}
  cards = fillCards(cards);
  $("cardCount").value = String(cardCount);
}

function formatMinutes(minutes) {
  const value = Math.round(Math.abs(minutes));
  const hours = Math.floor(value / 60);
  const mins = value % 60;
  return hours ? `${hours}時間${mins}分` : `${mins}分`;
}

function remainText(minutes) {
  const value = Math.max(0, Math.round(minutes));
  return `${Math.floor(value / 60)}時間${String(value % 60).padStart(2, "0")}分`;
}

function pace(minutes) {
  return Number.isFinite(minutes) && minutes > 0 ? `${minutes.toFixed(2)}分/件` : "-";
}

function paceMode(cardId) {
  return localStorage.getItem(PACE_MODE_KEY_PREFIX + cardId) === "hourly" ? "hourly" : "minutes";
}

function paceModeLabel(cardId) {
  return paceMode(cardId) === "hourly" ? "件/時" : "分/件";
}

function pacePerOrder(minutes) {
  return Number.isFinite(minutes) && minutes > 0 ? `${minutes.toFixed(1)}分/件` : "-";
}

function pacePerHour(minutes) {
  return Number.isFinite(minutes) && minutes > 0 ? `${(60 / minutes).toFixed(1)}件/時` : "-";
}

function paceCardText(minutes, cardId) {
  return paceMode(cardId) === "hourly" ? pacePerHour(minutes) : pacePerOrder(minutes);
}

function togglePaceDisplayMode(cardId) {
  const next = paceMode(cardId) === "hourly" ? "minutes" : "hourly";
  localStorage.setItem(PACE_MODE_KEY_PREFIX + cardId, next);
  calc();
}

function clock(date) {
  return date.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", hour12: false });
}

function eta(minutes) {
  if (!Number.isFinite(minutes) || minutes < 0) return "-";
  const now = new Date();
  const end = new Date(now.getTime() + minutes * 60000);
  return `${end.toDateString() !== now.toDateString() ? "翌" : ""}${clock(end)}`;
}

function endValue() {
  return $("endLimit").value || "";
}

function endInfo() {
  const value = endValue();
  if (!value) return null;
  const [hours, mins] = value.split(":").map(Number);
  if (!Number.isFinite(hours) || !Number.isFinite(mins)) return null;
  const now = new Date();
  const end = new Date(now);
  end.setHours(hours, mins, 0, 0);
  if (end <= now) {
    if (now - end <= 21600000) return { m: 0, d: end, over: true, label: clock(end) };
    end.setDate(end.getDate() + 1);
  }
  return {
    m: Math.max(0, Math.floor((end - now) / 60000)),
    d: end,
    over: false,
    label: `${end.toDateString() !== now.toDateString() ? "翌" : ""}${clock(end)}`
  };
}

function activeConstraint(remaining, limit) {
  if (!limit) return { m: remaining, label: "12時間制限", kind: "12h", endOn: false, endM: null, endLabel: "", over: false };
  if (limit.over) return { m: 0, label: `${limit.label}上限`, kind: "end", endOn: true, endM: 0, endLabel: limit.label, over: true };
  if (limit.m < remaining) return { m: limit.m, label: `${limit.label}上限`, kind: "end", endOn: true, endM: limit.m, endLabel: limit.label, over: false };
  return { m: remaining, label: "12時間制限", kind: "12h", endOn: true, endM: limit.m, endLabel: limit.label, over: false };
}

function constraintTag(active) {
  if (!active.endOn) return "12時間制限基準";
  return active.kind === "end" ? "終了上限基準" : "12時間制限基準";
}

function setTone(margin, targetPace, left) {
  const hero = $("hero");
  const main = $("mainValue");
  hero.className = "hero";
  main.className = "main";
  $("subValue").className = "sub";
  if (left === 0 || margin >= 15) {
    hero.classList.add("good");
    main.classList.add("goodTxt");
  } else if (margin >= 0) {
    hero.classList.add("warn");
    main.classList.add("warnTxt");
  } else if (Math.abs(margin) < targetPace) {
    hero.classList.add("late");
    main.classList.add("lateTxt");
  } else {
    hero.classList.add("bad");
    main.classList.add("badTxt");
  }
}

function bikeIcon(count) {
  const icon = "<span class=bike><i></i><b></b></span>";
  return `<span class="bikes">${icon.repeat(count)}</span>`;
}

function limitText(value, type) {
  if (Number.isFinite(value) && value > 0) {
    const rounded = Math.round(value);
    if (type === "s" && rounded < 10) return "シングル：ショート優先";
    if (type === "d" && rounded < 20) return "ダブル：厳しめ";
    return `${type === "s" ? "シングル" : "ダブル"} ${rounded}分まで`;
  }
  return type === "s" ? "シングル：ショート優先" : "ダブル：非推奨";
}

function limits(targetPace, margin) {
  return `<div class="limits"><span class="lim">${bikeIcon(1)}${limitText(targetPace + margin, "s")}</span><span class="lim">${bikeIcon(2)}${limitText(targetPace * 2 + margin, "d")}</span></div>`;
}

function renderClock(remaining) {
  $("countRemain").textContent = `残り ${remainText(remaining)}`;
  const button = $("countToggle");
  const sub = $("countSub");
  const dot = $("countDot");
  const panel = $("countPanel");
  if (clockState.on) {
    $("countStatus").textContent = "カウント中";
    button.classList.add("off");
    button.firstChild.nodeValue = "時間OFF";
    sub.textContent = "止める";
    dot.classList.remove("stop");
    panel.classList.add("run");
  } else {
    $("countStatus").textContent = "停止中";
    button.classList.remove("off");
    button.firstChild.nodeValue = "時間ON";
    sub.textContent = "進める";
    dot.classList.add("stop");
    panel.classList.remove("run");
  }
}

function renderCardSelectors() {
  const box = $("cardSelectors");
  box.innerHTML = "";
  for (let i = 0; i < 6; i++) {
    const wrapper = document.createElement("div");
    const label = document.createElement("label");
    const select = document.createElement("select");
    wrapper.className = "selBox";
    label.textContent = `カード${i + 1}`;
    select.id = `cardSel${i}`;
    CARD_OPTIONS.forEach(option => {
      const item = document.createElement("option");
      item.value = option[0];
      item.textContent = option[1];
      select.appendChild(item);
    });
    select.value = cards[i] || DEFAULT_CARDS[i];
    select.onchange = () => {
      cards[i] = select.value;
      save();
      calc();
    };
    wrapper.append(label, select);
    box.appendChild(wrapper);
  }
}

function applyCardCount() {
  cardCount = Number($("cardCount").value) === 3 ? 3 : 6;
  for (let i = 0; i < 6; i++) {
    const element = $(`cardSel${i}`);
    if (element) element.parentElement.style.display = i < cardCount ? "block" : "none";
  }
}

function isPaceToggleCard(id) {
  return id === "need" || id === "targetPace";
}

function drawCards(values) {
  const ids = fillCards(cards).slice(0, cardCount);
  $("metrics").innerHTML = ids.map(id => {
    const item = values[id] || values.remaining;
    const toggle = isPaceToggleCard(id);
    const attrs = toggle ? ` role="button" tabindex="0" aria-label="${item.k}の表示を切り替え" title="タップで分/件と件/時を切替"` : "";
    return `<div class="metric${toggle ? " paceToggle" : ""}" data-card-id="${id}"${attrs}><div class="k">${item.k}</div><div class="v">${item.v}</div>${item.n ? `<div class="note">${item.n}</div>` : ""}</div>`;
  }).join("");
}

function calc() {
  const target = Math.max(n("target"), 1);
  const done = Math.max(n("done"), 0);
  const wasCounting = clockState.on;
  const currentRemain = remain();
  const left = Math.max(target - done, 0);
  if (wasCounting) setRemain(currentRemain);
  if (left === 0 && wasCounting) stopClock(currentRemain);

  const end = endInfo();
  const active = activeConstraint(currentRemain, end);
  const effectiveRemain = active.m;
  const used = Math.max(0, WORK_LIMIT_MINUTES - currentRemain);
  const budget = used + effectiveRemain;
  const targetPace = budget / target;
  const required = left * targetPace;
  const margin = effectiveRemain - required;
  const neededPace = left ? effectiveRemain / left : 0;
  const actualPace = done > 0 && used > 0 ? used / done : NaN;
  const finish = Number.isFinite(actualPace) ? actualPace * left : NaN;
  const delta = targetPace > 0 ? done - used / targetPace : NaN;
  const rate = Math.min(done / target * 100, 100);
  const safe = Number.isFinite(actualPace) && actualPace > 0 ? done + Math.floor(effectiveRemain / actualPace) : NaN;
  const projection = Number.isFinite(actualPace) && actualPace > 0 ? (used + effectiveRemain) / actualPace : NaN;
  const etaCap = active.over ? currentRemain : effectiveRemain;
  const etaText = left === 0 ? "達成済み" : !Number.isFinite(finish) ? "計測待ち" : `${eta(Math.min(finish, etaCap))}予測`;
  const etaNote = left === 0 ? "目標達成済み" : active.over ? `${active.endLabel}を超過 / 稼働延長が必要` : !Number.isFinite(finish) ? "実績ペース計測待ち" : finish > etaCap ? "上限到達見込み" : "現ペース継続";

  setTone(margin, targetPace, left);
  $("constraintTag").textContent = constraintTag(active);
  $("endText").textContent = active.endOn ? `${active.endLabel}上限` : "なし";

  if (left === 0) {
    $("mainValue").textContent = "目標達成";
    $("subValue").textContent = `${done}件完了`;
    $("miniValue").textContent = "お疲れさまです";
  } else {
    $("mainValue").textContent = `${formatMinutes(margin)}${margin >= 0 ? "余裕" : "遅れ"}`;
    $("subValue").innerHTML = limits(targetPace, margin);
    $("miniValue").textContent = active.over ? `残り${left}件 / ${active.endLabel}を超過` : `残り${left}件 / ${active.label}まで${remainText(effectiveRemain)}`;
  }

  $("actualPace").textContent = pace(actualPace);
  $("requiredTime").textContent = formatMinutes(required);
  $("availableTime").textContent = `${remainText(effectiveRemain)} / ${active.label}`;
  $("scheduleDelta").textContent = Number.isFinite(delta) ? `${delta >= 0 ? "+" : ""}${delta.toFixed(2)}件` : "-";
  $("completionRate").textContent = `${rate.toFixed(1)}%`;
  $("nowClock").textContent = clock(new Date());
  renderClock(currentRemain);

  const constraintNote = active.endOn ? (active.kind === "end" ? "終了上限が12時間制限より短い" : `${active.endLabel}上限は補助情報`) : "終了上限なし";
  const values = {
    remaining: { k: "進捗件数", v: `<span class="progressCurrent">${Math.min(done, target)}</span><span class="progressGoal">/ ${target}件</span>`, n: `残り${left}件` },
    need: { k: "必要ペース", v: left ? paceCardText(neededPace, "need") : "達成済み", n: `タップで切替 / ${paceModeLabel("need")} / ${active.label}基準` },
    eta: { k: "終了予測", v: etaText, n: etaNote },
    safe: { k: "狙える件数", v: Number.isFinite(safe) ? `${safe}件まで` : "計測待ち", n: "実績ペース基準" },
    targetPace: { k: "目標ペース", v: paceCardText(targetPace, "targetPace"), n: `タップで切替 / ${paceModeLabel("targetPace")} / ${active.label}反映` },
    project12: { k: "上限まで走ると", v: Number.isFinite(projection) ? `${projection.toFixed(1)}件` : "計測待ち", n: `${active.label}基準` },
    constraint: { k: "制約条件", v: active.kind === "end" ? "終了上限基準" : "12時間制限基準", n: constraintNote }
  };
  applyCardCount();
  drawCards(values);
}

function setup() {
  addOptions($("target"), 10, 80, "件");
  addOptions($("done"), 0, 80, "件");
  addOptions($("remainH"), 0, 12, "時間");
  addOptions($("remainM"), 0, 59, "分", 1, true);
  $("target").value = "46";
  $("done").value = "10";
  $("remainH").value = "10";
  $("remainM").value = "12";

  load();
  loadClock();
  renderCardSelectors();
  calc();
  setInterval(calc, 15000);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) calc();
  });

  ["target", "done", "remainH", "remainM", "endLimit"].forEach(id => {
    $(id).addEventListener("change", () => {
      if (id === "remainH" || id === "remainM") syncClock();
      save();
      calc();
    });
  });
  $("cardCount").onchange = () => {
    cardCount = Number($("cardCount").value) === 3 ? 3 : 6;
    save();
    calc();
  };
  $("metrics").addEventListener("click", event => {
    const card = event.target.closest(".metric");
    if (card && isPaceToggleCard(card.dataset.cardId)) togglePaceDisplayMode(card.dataset.cardId);
  });
  $("metrics").addEventListener("keydown", event => {
    if (event.key !== "Enter" && event.key !== " ") return;
    const card = event.target.closest(".metric");
    if (!card || !isPaceToggleCard(card.dataset.cardId)) return;
    event.preventDefault();
    togglePaceDisplayMode(card.dataset.cardId);
  });
  $("clearEnd").onclick = () => {
    $("endLimit").value = "";
    save();
    calc();
  };
  $("plus").onclick = () => {
    $("done").value = String(Math.min(n("done") + 1, 80));
    save();
    calc();
  };
  $("minus").onclick = () => {
    $("done").value = String(Math.max(n("done") - 1, 0));
    save();
    calc();
  };
  $("reset").onclick = () => {
    if (!confirm("完了件数と残り時間をリセットしますか？")) return;
    $("done").value = "0";
    $("remainH").value = "12";
    $("remainM").value = "0";
    $("endLimit").value = "";
    clockState = { on: false, baseRemain: 720, baseAt: Date.now() };
    saveClock();
    save();
    calc();
  };
  $("countToggle").onclick = toggleClock;
  $("helpBtn").onclick = () => {
    const help = $("helpText");
    const open = help.hidden;
    help.hidden = !open;
    $("helpBtn").setAttribute("aria-expanded", String(open));
  };
}

setup();
if ("serviceWorker" in navigator) {
  addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
</script>
</body>
</html>
