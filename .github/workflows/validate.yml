name: Validate app
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check JavaScript syntax
        run: |
          node --check app-enhancements.js
          node --check app-enhancements-fix.js
          node --check app-session-ui-fix.js
          node --check sw.js
      - name: Verify required files
        run: |
          test -f index.html
          test -f compact.html
          test -f app-enhancements.js
          test -f app-enhancements-fix.js
          test -f app-session-ui-fix.js
          test -f sw.js
      - name: Run behavior and delivery tests
        run: node --test tests/*.test.js
